<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handwritten Digit Recognizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .canvas-container {
            border: 3px dashed #667eea;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
            background: #f9f9f9;
        }

        canvas {
            display: block;
            cursor: crosshair;
            background: white;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-recognize {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-recognize:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-recognize:active {
            transform: translateY(0);
        }

        .btn-clear {
            background: #ff6b6b;
            color: white;
        }

        .btn-clear:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .btn-clear:active {
            transform: translateY(0);
        }

        .result {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .result.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-digit {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
        }

        .result-confidence {
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        .confidence-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 10px;
            margin-top: 10px;
            overflow: hidden;
        }

        .confidence-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s ease;
        }

        .probabilities {
            margin-top: 20px;
            font-size: 12px;
        }

        .probability-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            align-items: center;
        }

        .probability-label {
            font-weight: bold;
            color: #333;
            width: 20px;
        }

        .probability-bar {
            background: #e0e0e0;
            border-radius: 5px;
            height: 6px;
            margin: 0 10px;
            flex: 1;
            overflow: hidden;
        }

        .probability-fill {
            background: #667eea;
            height: 100%;
            transition: width 0.3s ease;
        }

        .probability-value {
            color: #666;
            width: 40px;
            text-align: right;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-weight: bold;
            margin-top: 10px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .error {
            background: #ffe0e0;
            border-left: 4px solid #ff6b6b;
            padding: 15px;
            border-radius: 8px;
            color: #d32f2f;
            display: none;
            margin-bottom: 20px;
        }

        .error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✏️ Digit Recognizer</h1>
        <p class="subtitle">Draw a digit (0-9) and let AI recognize it</p>

        <div class="error" id="error"></div>

        <div class="canvas-container">
            <canvas id="drawingCanvas" width="400" height="400"></canvas>
        </div>

        <div class="controls">
            <button class="btn-recognize" onclick="recognizeDigit()">Recognize</button>
            <button class="btn-clear" onclick="clearCanvas()">Clear</button>
        </div>

        <div class="loading" id="loading">
            <p>🔄 Recognizing...</p>
        </div>

        <div class="result" id="result">
            <div class="result-digit" id="resultDigit">-</div>
            <div class="result-confidence">
                <span id="resultConfidence">Confidence: 0%</span>
                <div class="confidence-bar">
                    <div class="confidence-fill" id="confidenceFill" style="width: 0%"></div>
                </div>
            </div>
            <div class="probabilities" id="probabilities"></div>
        </div>
    </div>

    <script>
        // Get canvas and context
        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d');

        // Drawing state
        let isDrawing = false;

        // Initialize canvas
        function initCanvas() {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        // Clear canvas
        function clearCanvas() {
            initCanvas();
            document.getElementById('result').classList.remove('show');
            document.getElementById('error').classList.remove('show');
        }

        // Start drawing
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            ctx.beginPath();
            ctx.moveTo(x, y);
        });

        // Draw on canvas
        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            ctx.lineTo(x, y);
            ctx.stroke();
        });

        // Stop drawing
        canvas.addEventListener('mouseup', () => {
            isDrawing = false;
        });

        canvas.addEventListener('mouseout', () => {
            isDrawing = false;
        });

        // Touch support for mobile
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            ctx.beginPath();
            ctx.moveTo(x, y);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            ctx.lineTo(x, y);
            ctx.stroke();
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            isDrawing = false;
        });

        // Recognize digit
        async function recognizeDigit() {
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const error = document.getElementById('error');

            loading.classList.add('show');
            result.classList.remove('show');
            error.classList.remove('show');

            try {
                // Get canvas image as base64
                const imageData = canvas.toDataURL('image/png');

                // Send to server
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ image: imageData })
                });

                const data = await response.json();

                if (data.success) {
                    // Display result
                    document.getElementById('resultDigit').textContent = data.digit;
                    document.getElementById('resultConfidence').textContent =
                        `Confidence: ${data.confidence.toFixed(1)}%`;
                    document.getElementById('confidenceFill').style.width =
                        data.confidence + '%';

                    // Display probabilities
                    const probabilities = data.probabilities;
                    let probHtml = '';
                    probabilities.forEach((prob, index) => {
                        const percentage = (prob * 100).toFixed(1);
                        probHtml += `
                            <div class="probability-row">
                                <div class="probability-label">${index}</div>
                                <div class="probability-bar">
                                    <div class="probability-fill" style="width: ${percentage}%"></div>
                                </div>
                                <div class="probability-value">${percentage}%</div>
                            </div>
                        `;
                    });
                    document.getElementById('probabilities').innerHTML = probHtml;

                    result.classList.add('show');
                } else {
                    error.textContent = 'Error: ' + data.error;
                    error.classList.add('show');
                }
            } catch (err) {
                error.textContent = 'Error connecting to server: ' + err.message;
                error.classList.add('show');
            } finally {
                loading.classList.remove('show');
            }
        }

        // Initialize canvas on page load
        window.addEventListener('load', initCanvas);

        // Allow Enter key to recognize
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                recognizeDigit();
            }
        });
    </script>
</body>
</html>
