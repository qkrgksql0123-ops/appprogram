<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>손글씨 숫자 인식기 - 웹 버전</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .section {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .canvas-container {
            border: 3px dashed #667eea;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 0;
            background: #f9f9f9;
        }

        canvas {
            display: block;
            cursor: crosshair;
            background: white;
            width: 100%;
            max-width: 100%;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 5px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .button-group.full {
            grid-template-columns: 1fr;
        }

        button {
            padding: 12px 20px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-recognize {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-recognize:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-learn {
            background: #51cf66;
            color: white;
        }

        .btn-learn:hover {
            background: #40c057;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(81, 207, 102, 0.4);
        }

        .btn-retrain {
            background: #ffa94d;
            color: white;
        }

        .btn-retrain:hover {
            background: #ff922b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 169, 77, 0.4);
        }

        .btn-clear {
            background: #ff6b6b;
            color: white;
        }

        .btn-clear:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 0;
            display: none;
        }

        .result.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-digit {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
        }

        .result-confidence {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .confidence-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 10px;
            margin-top: 8px;
            overflow: hidden;
        }

        .confidence-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s ease;
        }

        .probabilities {
            margin-top: 15px;
            font-size: 11px;
        }

        .probability-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            align-items: center;
        }

        .probability-label {
            font-weight: bold;
            color: #333;
            width: 20px;
        }

        .probability-bar {
            background: #e0e0e0;
            border-radius: 5px;
            height: 6px;
            margin: 0 10px;
            flex: 1;
            overflow: hidden;
        }

        .probability-fill {
            background: #667eea;
            height: 100%;
            transition: width 0.3s ease;
        }

        .probability-value {
            color: #666;
            width: 40px;
            text-align: right;
        }

        .status {
            background: #f0f4ff;
            border-left: 4px solid #51cf66;
            padding: 15px;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
            text-align: center;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-weight: bold;
            margin: 15px 0;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #ffe0e0;
            border-left: 4px solid #ff6b6b;
            padding: 15px;
            border-radius: 8px;
            color: #d32f2f;
            display: none;
            margin-bottom: 15px;
            font-size: 13px;
        }

        .error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✏️ 손글씨 숫자 인식기</h1>
        <p class="subtitle">웹에서 숫자를 그리고 AI가 인식합니다</p>

        <div class="error" id="error"></div>

        <div class="section">
            <div class="section-title">1단계: 숫자를 그려주세요</div>
            <div class="canvas-container">
                <canvas id="drawingCanvas" width="500" height="400"></canvas>
            </div>
        </div>

        <div class="section">
            <div class="section-title">2단계: 인식하기</div>
            <div class="button-group">
                <button class="btn-recognize" onclick="recognizeDigit()">🔍 인식</button>
                <button class="btn-clear" onclick="clearCanvas()">🗑️ 지우기</button>
            </div>
        </div>

        <div class="result" id="result">
            <div class="result-digit" id="resultDigit">-</div>
            <div class="result-confidence">
                <span id="resultConfidence">신뢰도: 0%</span>
                <div class="confidence-bar">
                    <div class="confidence-fill" id="confidenceFill" style="width: 0%"></div>
                </div>
            </div>
            <div class="probabilities" id="probabilities"></div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>인식 중...
        </div>

        <div class="section">
            <div class="section-title">3단계: 실제 숫자를 입력하고 학습에 추가</div>
            <div class="input-group">
                <div style="flex: 1;">
                    <label for="digitLabel">실제 숫자 (0-9):</label>
                    <input type="text" id="digitLabel" placeholder="0" maxlength="1" />
                </div>
            </div>
            <div class="button-group full">
                <button class="btn-learn" onclick="addToLearning()">📚 학습에 추가</button>
            </div>
        </div>

        <div class="section">
            <div class="section-title">4단계: 모델 개선하기</div>
            <button class="btn-retrain full" onclick="retrainModel()">🔧 모델 재학습</button>
        </div>

        <div class="status" id="status">
            학습 데이터: <span id="statusCount">0</span>개
        </div>
    </div>

    <script>
        // Canvas setup
        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        // Initialize canvas
        function initCanvas() {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        initCanvas();

        // Drawing events
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            ctx.beginPath();
            ctx.moveTo(x, y);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            ctx.lineTo(x, y);
            ctx.stroke();
        });

        canvas.addEventListener('mouseup', () => {
            isDrawing = false;
        });

        canvas.addEventListener('mouseout', () => {
            isDrawing = false;
        });

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            ctx.beginPath();
            ctx.moveTo(x, y);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            ctx.lineTo(x, y);
            ctx.stroke();
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            isDrawing = false;
        });

        // Clear canvas
        function clearCanvas() {
            initCanvas();
            document.getElementById('result').classList.remove('show');
            document.getElementById('error').classList.remove('show');
            document.getElementById('digitLabel').value = '';
            document.getElementById('digitLabel').focus();
        }

        // Recognize digit
        async function recognizeDigit() {
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const error = document.getElementById('error');

            loading.classList.add('show');
            result.classList.remove('show');
            error.classList.remove('show');

            try {
                const imageData = canvas.toDataURL('image/png');

                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ image: imageData })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('resultDigit').textContent = data.digit;
                    document.getElementById('resultConfidence').textContent =
                        `신뢰도: ${data.confidence.toFixed(1)}%`;
                    document.getElementById('confidenceFill').style.width =
                        data.confidence + '%';

                    const probabilities = data.probabilities;
                    let probHtml = '';
                    probabilities.forEach((prob, index) => {
                        const percentage = (prob * 100).toFixed(1);
                        probHtml += `
                            <div class="probability-row">
                                <div class="probability-label">${index}</div>
                                <div class="probability-bar">
                                    <div class="probability-fill" style="width: ${percentage}%"></div>
                                </div>
                                <div class="probability-value">${percentage}%</div>
                            </div>
                        `;
                    });
                    document.getElementById('probabilities').innerHTML = probHtml;

                    result.classList.add('show');
                    document.getElementById('digitLabel').focus();
                } else {
                    error.textContent = '오류: ' + data.error;
                    error.classList.add('show');
                }
            } catch (err) {
                error.textContent = '서버 연결 오류: ' + err.message;
                error.classList.add('show');
            } finally {
                loading.classList.remove('show');
            }
        }

        // Add to learning
        async function addToLearning() {
            const digitInput = document.getElementById('digitLabel').value.trim();
            const error = document.getElementById('error');

            if (!digitInput || isNaN(digitInput) || digitInput < 0 || digitInput > 9) {
                error.textContent = '오류: 0-9 중 한 개의 숫자만 입력해주세요!';
                error.classList.add('show');
                return;
            }

            try {
                const imageData = canvas.toDataURL('image/png');

                const response = await fetch('/add_to_training', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        image: imageData,
                        label: digitInput
                    })
                });

                const data = await response.json();

                if (data.success) {
                    alert(`숫자 ${digitInput}이(가) 학습 데이터에 추가되었습니다!\n(총 ${data.total_samples}개)`);
                    updateStatus();
                    clearCanvas();
                } else {
                    error.textContent = '오류: ' + data.error;
                    error.classList.add('show');
                }
            } catch (err) {
                error.textContent = '서버 연결 오류: ' + err.message;
                error.classList.add('show');
            }
        }

        // Retrain model
        async function retrainModel() {
            const confirmed = confirm('현재 학습 데이터로 모델을 재학습하시겠습니까?\n(약 1-2분 소요)');
            if (!confirmed) return;

            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const btn = event.target;

            loading.classList.add('show');
            error.classList.remove('show');
            btn.disabled = true;

            try {
                const response = await fetch('/retrain', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (data.success) {
                    alert('모델 재학습이 완료되었습니다!\n이제 더 정확한 인식이 가능합니다.');
                } else {
                    error.textContent = '오류: ' + data.error;
                    error.classList.add('show');
                }
            } catch (err) {
                error.textContent = '서버 연결 오류: ' + err.message;
                error.classList.add('show');
            } finally {
                loading.classList.remove('show');
                btn.disabled = false;
            }
        }

        // Update status
        async function updateStatus() {
            try {
                const response = await fetch('/get_status');
                const data = await response.json();
                document.getElementById('statusCount').textContent = data.custom_data_count;
            } catch (err) {
                console.error('상태 업데이트 오류:', err);
            }
        }

        // Initialize
        updateStatus();

        // Allow Enter key
        document.getElementById('digitLabel').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addToLearning();
            }
        });
    </script>
</body>
</html>
